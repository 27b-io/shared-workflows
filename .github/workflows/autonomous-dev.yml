# Thin caller for autonomous executor (same-repo)
name: Autonomous Dev
on:
  workflow_dispatch:
    inputs:
      issue_number:
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  execute:
    uses: ./.github/workflows/autonomous-executor.yml
    with:
      issue_number: ${{ inputs.issue_number }}
      repo: shared-workflows
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
